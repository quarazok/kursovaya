services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - db-data:/var/opt/mssql

  backend:
    build: ./DeliveryApi
    ports:
      - "5206:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=DeliveryDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;Encrypt=False;"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: DeliveryApi
      Jwt__Audience: DeliveryFrontend
    depends_on:
      - db

  frontend:
    build: ./Frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db-data:
