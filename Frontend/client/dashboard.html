<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Личный кабинет — Быстрая доставка</title>
  <style>
    :root {
      --orange:#FF6600; --orange-dark:#CC5200; --orange-light:#FFF3EE;
      --bg:#F8F8F8; --white:#fff; --border:#E0E0E0; --muted:#777;
      --text:#333; --radius:8px; --shadow:0 2px 10px rgba(0,0,0,0.07);
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Segoe UI',Arial,sans-serif; background:var(--bg); color:var(--text); font-size:14px; }

    header { background:var(--white); border-bottom:3px solid var(--orange); position:sticky; top:0; z-index:100; box-shadow:var(--shadow); }
    .hdr { max-width:960px; margin:0 auto; padding:0 24px; height:56px; display:flex; align-items:center; gap:16px; }
    .logo { font-size:18px; font-weight:800; color:var(--orange); text-decoration:none; flex:1; }
    .user-name { font-size:13px; color:var(--muted); }

    .btn { display:inline-block; padding:7px 16px; border-radius:var(--radius); font-size:13px; font-weight:600; cursor:pointer; border:none; text-decoration:none; transition:background 0.15s; }
    .btn-primary { background:var(--orange); color:#fff; }
    .btn-primary:hover { background:var(--orange-dark); }
    .btn-outline { background:transparent; color:var(--orange); border:2px solid var(--orange); }
    .btn-outline:hover { background:var(--orange-light); }
    .btn-ghost { background:#eee; color:var(--text); }
    .btn-ghost:hover { background:#ddd; }
    .btn-sm { padding:4px 12px; font-size:12px; }
    .btn:disabled { opacity:0.55; cursor:not-allowed; }

    main { max-width:960px; margin:0 auto; padding:28px 24px; }
    .page-title { font-size:22px; font-weight:700; margin-bottom:20px; }

    .card { background:var(--white); border-radius:var(--radius); box-shadow:var(--shadow); padding:22px; margin-bottom:20px; }
    .card-title { font-size:16px; font-weight:700; margin-bottom:16px; }

    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
    .form-group { display:flex; flex-direction:column; gap:4px; }
    .form-group.full { grid-column:1/-1; }
    label { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.3px; }
    input, textarea, select { padding:8px 10px; border:1px solid var(--border); border-radius:var(--radius); font-size:13px; outline:none; transition:border-color 0.15s; font-family:inherit; width:100%; }
    input:focus, textarea:focus, select:focus { border-color:var(--orange); box-shadow:0 0 0 2px rgba(255,102,0,0.1); }
    textarea { resize:vertical; min-height:60px; }

    .table-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    thead th { background:#F5F5F5; padding:9px 12px; text-align:left; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.4px; color:var(--muted); border-bottom:2px solid var(--border); white-space:nowrap; }
    tbody tr { border-bottom:1px solid var(--border); transition:background 0.1s; }
    tbody tr:hover { background:#FFFAF7; }
    tbody td { padding:10px 12px; vertical-align:middle; }

    .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; white-space:nowrap; }
    .badge-pending   { background:#F5F5F5; color:#757575; }
    .badge-assigned  { background:#E3F2FD; color:#1565C0; }
    .badge-inprogress{ background:#FFF3E0; color:#E65100; }
    .badge-delivered { background:#E8F5E9; color:#2E7D32; }
    .badge-cancelled { background:#FFEBEE; color:#C62828; }
    .badge-paid      { background:#E8F5E9; color:#2E7D32; }

    .detail-row td { padding:0 12px 10px; }
    .detail-panel { display:none; background:var(--bg); border-radius:var(--radius); padding:16px; border-left:4px solid var(--orange); }
    .detail-panel.open { display:block; }
    .detail-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:14px; }
    .detail-label { font-size:11px; text-transform:uppercase; letter-spacing:0.3px; color:var(--muted); font-weight:700; margin-bottom:3px; }
    .detail-value { font-size:13px; font-weight:500; }

    .pay-block { display:flex; gap:10px; align-items:center; flex-wrap:wrap; border-top:1px solid var(--border); padding-top:12px; margin-top:4px; }
    .pay-block select { max-width:180px; }
    .pay-label { font-size:13px; font-weight:600; color:var(--text); }

    .notif { position:fixed; top:0; left:0; right:0; padding:12px; text-align:center; font-size:14px; font-weight:600; z-index:200; transform:translateY(-100%); transition:transform 0.25s; }
    .notif.show { transform:translateY(0); }
    .notif.ok  { background:#388E3C; color:#fff; }
    .notif.err { background:#D32F2F; color:#fff; }

    .empty { text-align:center; padding:36px; color:var(--muted); }

    @media(max-width:600px) {
      .form-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<div class="notif" id="notif"></div>

<header>
  <div class="hdr">
    <a href="index.html" class="logo">🚚 Быстрая доставка</a>
    <span class="user-name" id="hdr-name"></span>
    <button class="btn btn-outline btn-sm" onclick="clientLogout()">Выйти</button>
  </div>
</header>

<main>
  <div class="page-title">Личный кабинет</div>

  <!-- Новый заказ -->
  <div class="card">
    <div class="card-title">📦 Новый заказ</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Адрес отправки</label>
        <input type="text" id="f-pickup" placeholder="ул. Ленина, 1, кв. 5">
      </div>
      <div class="form-group">
        <label>Адрес доставки</label>
        <input type="text" id="f-delivery" placeholder="ул. Мира, 10, оф. 3">
      </div>
      <div class="form-group full">
        <label>Описание груза (необязательно)</label>
        <textarea id="f-desc" placeholder="Хрупкий груз, документы..."></textarea>
      </div>
    </div>
    <button class="btn btn-primary" onclick="createOrder()" id="btn-order">Оформить заказ</button>
  </div>

  <!-- Мои заказы -->
  <div class="card">
    <div class="card-title">📋 Мои заказы</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Куда</th>
            <th>Статус</th>
            <th>Дата</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="orders-tbody">
          <tr><td colspan="5" class="empty">Загрузка...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<script src="js/client-auth.js"></script>
<script>
requireClientAuth();

const name = localStorage.getItem('client_firstName') || '';
document.getElementById('hdr-name').textContent = name ? `Привет, ${name}!` : '';

const API = 'http://localhost:5206/api/clientportal';

const ORDER_STATUS = {
  0: { label: 'Принят, ожидаем курьера', cls: 'pending' },
  1: { label: 'Курьер назначен',          cls: 'assigned' },
  2: { label: 'Курьер в пути',            cls: 'inprogress' },
  3: { label: 'Доставлен',               cls: 'delivered' },
  4: { label: 'Отменён',                 cls: 'cancelled' },
};

const PAYMENT_STATUS = {
  0: { label: 'Ожидает оплаты', cls: 'pending' },
  1: { label: 'Оплачен',        cls: 'paid' },
  2: { label: 'Отменён',        cls: 'cancelled' },
};

function notify(msg, type = 'ok') {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.className = `notif ${type} show`;
  setTimeout(() => el.classList.remove('show'), 3000);
}

function toggleDetail(id) {
  const panel = document.getElementById(`detail-${id}`);
  if (panel) panel.classList.toggle('open');
}

async function payOrder(id, btnEl) {
  const sel = document.getElementById(`pay-method-${id}`);
  const method = parseInt(sel.value, 10);

  btnEl.disabled = true; btnEl.textContent = 'Оплата...';
  try {
    const r = await fetch(`${API}/orders/${id}/pay`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(method),
    });
    if (!r.ok) {
      const msg = await r.text();
      notify(msg || 'Ошибка оплаты', 'err');
      return;
    }
    notify('Оплата принята!');
    loadOrders();
  } catch {
    notify('Не удалось подключиться к серверу', 'err');
  } finally {
    btnEl.disabled = false; btnEl.textContent = 'Оплатить';
  }
}

async function loadOrders() {
  try {
    const r = await fetch(`${API}/orders`);
    if (!r.ok) throw new Error(r.status);
    const orders = await r.json();
    const tbody = document.getElementById('orders-tbody');

    if (!orders.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">У вас ещё нет заказов. Оформите первый!</td></tr>';
      return;
    }

    tbody.innerHTML = orders.map(o => {
      const st   = ORDER_STATUS[o.status] ?? { label: '—', cls: 'pending' };
      const date = new Date(o.createdAt).toLocaleDateString('ru-RU');

      const canPay = o.status === 3 && o.payment && o.payment.status === 0;
      const pSt    = o.payment ? (PAYMENT_STATUS[o.payment.status] ?? { label: '—', cls: 'pending' }) : null;

      const detailHtml = `
        <div class="detail-panel" id="detail-${o.id}">
          <div class="detail-grid">
            <div>
              <div class="detail-label">Куда</div>
              <div class="detail-value">${o.deliveryAddress}</div>
            </div>
            <div>
              <div class="detail-label">Откуда</div>
              <div class="detail-value">${o.pickupAddress}</div>
            </div>
            ${o.description ? `<div><div class="detail-label">Описание</div><div class="detail-value">${o.description}</div></div>` : ''}
            <div>
              <div class="detail-label">Статус заказа</div>
              <div class="detail-value"><span class="badge badge-${st.cls}">${st.label}</span></div>
            </div>
            ${pSt ? `<div><div class="detail-label">Оплата</div><div class="detail-value"><span class="badge badge-${pSt.cls}">${pSt.label}</span></div></div>` : ''}
          </div>
          ${canPay ? `
          <div class="pay-block">
            <span class="pay-label">Оплатить:</span>
            <select id="pay-method-${o.id}">
              <option value="0">Наличные</option>
              <option value="1">Карта</option>
              <option value="2">Перевод</option>
            </select>
            <button class="btn btn-primary btn-sm" onclick="payOrder(${o.id}, this)">Оплатить</button>
          </div>` : ''}
        </div>`;

      return `
        <tr>
          <td>${o.id}</td>
          <td>${o.deliveryAddress}</td>
          <td><span class="badge badge-${st.cls}">${st.label}</span></td>
          <td>${date}</td>
          <td><button class="btn btn-ghost btn-sm" onclick="toggleDetail(${o.id})">Подробнее</button></td>
        </tr>
        <tr class="detail-row"><td colspan="5">${detailHtml}</td></tr>`;
    }).join('');
  } catch {
    document.getElementById('orders-tbody').innerHTML =
      '<tr><td colspan="5" class="empty" style="color:#D32F2F">Ошибка загрузки заказов.</td></tr>';
  }
}

async function createOrder() {
  const pickupAddress   = document.getElementById('f-pickup').value.trim();
  const deliveryAddress = document.getElementById('f-delivery').value.trim();
  const description     = document.getElementById('f-desc').value.trim() || null;
  const btn             = document.getElementById('btn-order');

  if (!pickupAddress || !deliveryAddress) {
    notify('Укажите адреса отправки и доставки', 'err'); return;
  }

  btn.disabled = true; btn.textContent = 'Оформление...';
  try {
    const r = await fetch(`${API}/orders`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pickupAddress, deliveryAddress, description }),
    });
    if (!r.ok) {
      const msg = await r.text();
      notify(msg || 'Ошибка создания заказа', 'err'); return;
    }
    document.getElementById('f-pickup').value   = '';
    document.getElementById('f-delivery').value = '';
    document.getElementById('f-desc').value     = '';
    notify('Заказ оформлен! Ожидайте назначения курьера.');
    loadOrders();
  } catch {
    notify('Не удалось подключиться к серверу', 'err');
  } finally {
    btn.disabled = false; btn.textContent = 'Оформить заказ';
  }
}

loadOrders();
</script>

</body>
</html>
