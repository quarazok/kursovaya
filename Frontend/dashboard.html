<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Быстрая доставка — Дашборд</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="notification" id="notification"></div>

<header>
  <div class="header-inner">
    <a href="dashboard.html" class="logo">🚚 Быстрая доставка</a>
    <nav>
      <a href="dashboard.html" class="active">Дашборд</a>
      <a href="clients.html">Клиенты</a>
      <a href="couriers.html">Курьеры</a>
      <a href="orders.html">Заказы</a>
      <a href="deliveries.html">Доставки</a>
      <a href="payments.html">Платежи</a>
    </nav>
  </div>
</header>

<main>
  <div class="page-title">Дашборд</div>

  <div class="stats-grid">
    <a href="clients.html" class="stat-card">
      <div class="stat-label">Клиенты</div>
      <div class="stat-value" id="count-clients">—</div>
      <div class="stat-sub">всего зарегистрировано</div>
    </a>
    <a href="couriers.html" class="stat-card">
      <div class="stat-label">Курьеры</div>
      <div class="stat-value" id="count-couriers">—</div>
      <div class="stat-sub" id="sub-couriers">свободных: —</div>
    </a>
    <a href="orders.html" class="stat-card">
      <div class="stat-label">Заказы</div>
      <div class="stat-value" id="count-orders">—</div>
      <div class="stat-sub" id="sub-orders">активных: —</div>
    </a>
    <a href="deliveries.html" class="stat-card">
      <div class="stat-label">Доставки</div>
      <div class="stat-value" id="count-deliveries">—</div>
      <div class="stat-sub" id="sub-deliveries">в процессе: —</div>
    </a>
    <a href="payments.html" class="stat-card">
      <div class="stat-label">Платежи</div>
      <div class="stat-value" id="count-payments">—</div>
      <div class="stat-sub" id="sub-payments">оплачено: —</div>
    </a>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">Последние заказы</span>
      <a href="orders.html" class="btn btn-secondary btn-sm">Все заказы</a>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Клиент</th>
            <th>Адрес доставки</th>
            <th>Статус</th>
            <th>Дата</th>
          </tr>
        </thead>
        <tbody id="recent-orders">
          <tr><td colspan="5" class="empty-state">Загрузка...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<script src="js/auth.js"></script>
<script>
requireAuth();
setupHeader();

const API = 'http://localhost:5206/api';

const statusLabels = {
  0: ['New', 'new'],
  1: ['Назначен', 'assigned'],
  2: ['В пути', 'inprogress'],
  3: ['Доставлен', 'delivered'],
  4: ['Отменён', 'cancelled'],
};

async function load() {
  try {
    const [clients, couriers, orders, deliveries, payments] = await Promise.all([
      fetch(`${API}/clients`).then(r => r.json()),
      fetch(`${API}/couriers`).then(r => r.json()),
      fetch(`${API}/orders`).then(r => r.json()),
      fetch(`${API}/deliveries`).then(r => r.json()),
      fetch(`${API}/payments`).then(r => r.json()),
    ]);

    document.getElementById('count-clients').textContent = clients.length;

    document.getElementById('count-couriers').textContent = couriers.length;
    const freeCount = couriers.filter(c => c.isAvailable).length;
    document.getElementById('sub-couriers').textContent = `свободных: ${freeCount}`;

    document.getElementById('count-orders').textContent = orders.length;
    const activeOrders = orders.filter(o => o.status !== 3 && o.status !== 4).length;
    document.getElementById('sub-orders').textContent = `активных: ${activeOrders}`;

    document.getElementById('count-deliveries').textContent = deliveries.length;
    const inProgress = deliveries.filter(d => d.status === 1).length;
    document.getElementById('sub-deliveries').textContent = `в процессе: ${inProgress}`;

    document.getElementById('count-payments').textContent = payments.length;
    const paid = payments.filter(p => p.status === 1).length;
    document.getElementById('sub-payments').textContent = `оплачено: ${paid}`;

    // Последние 5 заказов (по убыванию id)
    const recent = [...orders].sort((a, b) => b.id - a.id).slice(0, 5);
    const tbody = document.getElementById('recent-orders');
    if (recent.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty-state">Заказов пока нет</td></tr>';
    } else {
      tbody.innerHTML = recent.map(o => {
        const [label, cls] = statusLabels[o.status] ?? ['—', 'new'];
        const clientName = o.client ? `${o.client.firstName} ${o.client.lastName}` : `#${o.clientId}`;
        const date = new Date(o.createdAt).toLocaleDateString('ru-RU');
        return `<tr>
          <td>${o.id}</td>
          <td>${clientName}</td>
          <td>${o.deliveryAddress}</td>
          <td><span class="badge badge-${cls}">${label}</span></td>
          <td>${date}</td>
        </tr>`;
      }).join('');
    }
  } catch (e) {
    document.getElementById('recent-orders').innerHTML =
      '<tr><td colspan="5" class="empty-state" style="color:#D32F2F">Не удалось подключиться к API. Запустите сервер командой <code>dotnet run</code></td></tr>';
  }
}

load();
</script>

</body>
</html>
