<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Курьеры — Быстрая доставка</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="notification" id="notification"></div>

<header>
  <div class="header-inner">
    <a href="dashboard.html" class="logo">🚚 Быстрая доставка</a>
    <nav>
      <a href="dashboard.html">Дашборд</a>
      <a href="clients.html">Клиенты</a>
      <a href="couriers.html" class="active">Курьеры</a>
      <a href="orders.html">Заказы</a>
      <a href="deliveries.html">Доставки</a>
      <a href="payments.html">Платежи</a>
    </nav>
  </div>
</header>

<main>
  <div class="page-title">Курьеры</div>

  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Имя</th>
            <th>Фамилия</th>
            <th>Телефон</th>
            <th>Email</th>
            <th>Статус</th>
          </tr>
        </thead>
        <tbody id="couriers-tbody">
          <tr><td colspan="6" class="empty-state">Загрузка...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<script src="js/auth.js"></script>
<script>
requireAuth();
setupHeader();

const API = 'http://localhost:5206/api/couriers';

async function loadCouriers() {
  try {
    const r = await fetch(API);
    if (!r.ok) throw new Error(r.status);
    const couriers = await r.json();
    const tbody = document.getElementById('couriers-tbody');
    if (couriers.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Курьеров пока нет</td></tr>';
      return;
    }
    tbody.innerHTML = couriers.map(c => {
      const badge = c.isAvailable
        ? '<span class="badge badge-available">Свободен</span>'
        : '<span class="badge badge-busy">Занят</span>';
      return `<tr>
        <td>${c.id}</td>
        <td>${c.firstName}</td>
        <td>${c.lastName}</td>
        <td>${c.phone}</td>
        <td>${c.email ?? '—'}</td>
        <td>${badge}</td>
      </tr>`;
    }).join('');
  } catch (e) {
    document.getElementById('couriers-tbody').innerHTML =
      '<tr><td colspan="6" class="empty-state" style="color:#D32F2F">Ошибка загрузки. Проверьте, запущен ли сервер.</td></tr>';
  }
}

loadCouriers();
</script>

</body>
</html>
