<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Клиенты — Быстрая доставка</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="notification" id="notification"></div>

<header>
  <div class="header-inner">
    <a href="dashboard.html" class="logo">🚚 Быстрая доставка</a>
    <nav>
      <a href="dashboard.html">Дашборд</a>
      <a href="clients.html" class="active">Клиенты</a>
      <a href="couriers.html">Курьеры</a>
      <a href="orders.html">Заказы</a>
      <a href="deliveries.html">Доставки</a>
      <a href="payments.html">Платежи</a>
    </nav>
  </div>
</header>

<main>
  <div class="page-title">Клиенты</div>

  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Имя</th>
            <th>Фамилия</th>
            <th>Телефон</th>
            <th>Email</th>
          </tr>
        </thead>
        <tbody id="clients-tbody">
          <tr><td colspan="5" class="empty-state">Загрузка...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<script src="js/auth.js"></script>
<script>
requireAuth();
setupHeader();

const API = 'http://localhost:5206/api/clients';

async function loadClients() {
  try {
    const r = await fetch(API);
    if (!r.ok) throw new Error(r.status);
    const clients = await r.json();
    const tbody = document.getElementById('clients-tbody');
    if (clients.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty-state">Клиентов пока нет</td></tr>';
      return;
    }
    tbody.innerHTML = clients.map(c => `
      <tr>
        <td>${c.id}</td>
        <td>${c.firstName}</td>
        <td>${c.lastName}</td>
        <td>${c.phone}</td>
        <td>${c.email ?? '—'}</td>
      </tr>`).join('');
  } catch (e) {
    document.getElementById('clients-tbody').innerHTML =
      '<tr><td colspan="5" class="empty-state" style="color:#D32F2F">Ошибка загрузки. Проверьте, запущен ли сервер.</td></tr>';
  }
}

loadClients();
</script>

</body>
</html>
