<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Клиенты — Быстрая доставка</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="notification" id="notification"></div>

<header>
  <div class="header-inner">
    <a href="dashboard.html" class="logo">🚚 Быстрая доставка</a>
    <nav>
      <a href="dashboard.html">Дашборд</a>
      <a href="clients.html" class="active">Клиенты</a>
      <a href="couriers.html">Курьеры</a>
      <a href="orders.html">Заказы</a>
      <a href="deliveries.html">Доставки</a>
      <a href="payments.html">Платежи</a>
    </nav>
  </div>
</header>

<main>
  <div class="page-title">Клиенты</div>

  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Имя</th>
            <th>Фамилия</th>
            <th>Телефон</th>
            <th>Email</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody id="clients-tbody">
          <tr><td colspan="6" class="empty-state">Загрузка...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title" id="form-title">Добавить клиента</span>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label>Имя</label>
        <input type="text" id="f-firstName" placeholder="Иван">
      </div>
      <div class="form-group">
        <label>Фамилия</label>
        <input type="text" id="f-lastName" placeholder="Иванов">
      </div>
      <div class="form-group">
        <label>Телефон</label>
        <input type="text" id="f-phone" placeholder="+7 900 000-00-00">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="f-email" placeholder="ivan@example.com">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" id="btn-save" onclick="saveClient()">Добавить</button>
      <button class="btn btn-secondary" id="btn-cancel" onclick="cancelEdit()" style="display:none">Отмена</button>
    </div>
  </div>
</main>

<script src="js/auth.js"></script>
<script>
requireAuth();
setupHeader();

const API = 'http://localhost:5206/api/clients';
let editId = null;

const isAdmin = localStorage.getItem('role') === 'Admin';
const formCard = document.querySelectorAll('main .card')[1];
if (!isAdmin) formCard.style.display = 'none';

function notify(msg, type = 'success') {
  const el = document.getElementById('notification');
  el.textContent = msg;
  el.className = `notification ${type} show`;
  setTimeout(() => el.classList.remove('show'), 3000);
}

async function loadClients() {
  try {
    const r = await fetch(API);
    if (!r.ok) throw new Error(r.status);
    const clients = await r.json();
    const tbody = document.getElementById('clients-tbody');
    if (clients.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Клиентов пока нет</td></tr>';
      return;
    }
    tbody.innerHTML = clients.map(c => `
      <tr>
        <td>${c.id}</td>
        <td>${c.firstName}</td>
        <td>${c.lastName}</td>
        <td>${c.phone}</td>
        <td>${c.email ?? '—'}</td>
        <td>
          <div class="actions-cell">
            <button class="btn btn-secondary btn-sm" onclick="editClient(${c.id},'${esc(c.firstName)}','${esc(c.lastName)}','${esc(c.phone)}','${esc(c.email ?? '')}')">Изменить</button>
            <button class="btn btn-danger btn-sm" onclick="deleteClient(${c.id})">Удалить</button>
          </div>
        </td>
      </tr>`).join('');
  } catch (e) {
    document.getElementById('clients-tbody').innerHTML =
      '<tr><td colspan="6" class="empty-state" style="color:#D32F2F">Ошибка загрузки. Проверьте, запущен ли сервер.</td></tr>';
  }
}

function esc(s) { return String(s).replace(/'/g, "\\'"); }

function editClient(id, firstName, lastName, phone, email) {
  editId = id;
  formCard.style.display = '';
  document.getElementById('f-firstName').value = firstName;
  document.getElementById('f-lastName').value = lastName;
  document.getElementById('f-phone').value = phone;
  document.getElementById('f-email').value = email;
  document.getElementById('form-title').textContent = `Редактировать клиента #${id}`;
  document.getElementById('btn-save').textContent = 'Сохранить';
  document.getElementById('btn-cancel').style.display = '';
  document.getElementById('f-firstName').focus();
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function cancelEdit() {
  editId = null;
  document.getElementById('f-firstName').value = '';
  document.getElementById('f-lastName').value = '';
  document.getElementById('f-phone').value = '';
  document.getElementById('f-email').value = '';
  document.getElementById('form-title').textContent = 'Добавить клиента';
  document.getElementById('btn-save').textContent = 'Добавить';
  document.getElementById('btn-cancel').style.display = 'none';
  if (!isAdmin) formCard.style.display = 'none';
}

async function saveClient() {
  const firstName = document.getElementById('f-firstName').value.trim();
  const lastName  = document.getElementById('f-lastName').value.trim();
  const phone     = document.getElementById('f-phone').value.trim();
  const email     = document.getElementById('f-email').value.trim() || null;

  if (!firstName || !lastName || !phone) {
    notify('Заполните Имя, Фамилию и Телефон', 'error');
    return;
  }

  const body = { firstName, lastName, phone, email };

  try {
    let r;
    if (editId) {
      r = await fetch(`${API}/${editId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
    } else {
      r = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
    }
    if (!r.ok) throw new Error(r.status);
    notify(editId ? 'Клиент обновлён' : 'Клиент добавлен');
    cancelEdit();
    loadClients();
  } catch (e) {
    notify('Ошибка сохранения: ' + e.message, 'error');
  }
}

async function deleteClient(id) {
  if (!confirm(`Удалить клиента #${id}?`)) return;
  try {
    const r = await fetch(`${API}/${id}`, { method: 'DELETE' });
    if (!r.ok) {
      const msg = await r.text();
      notify(msg || `Ошибка ${r.status}`, 'error');
      return;
    }
    notify('Клиент удалён');
    loadClients();
  } catch (e) {
    notify('Ошибка удаления: ' + e.message, 'error');
  }
}

loadClients();
</script>

</body>
</html>
