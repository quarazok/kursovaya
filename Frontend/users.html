<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Пользователи — Быстрая доставка</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="notification" id="notification"></div>

<header>
  <div class="header-inner">
    <a href="dashboard.html" class="logo">🚚 Быстрая доставка</a>
    <nav>
      <a href="dashboard.html">Дашборд</a>
      <a href="clients.html">Клиенты</a>
      <a href="couriers.html">Курьеры</a>
      <a href="orders.html">Заказы</a>
      <a href="deliveries.html">Доставки</a>
      <a href="payments.html">Платежи</a>
    </nav>
  </div>
</header>

<main>
  <div class="page-title">Управление пользователями</div>

  <!-- Статистика системы (только для админа) -->
  <div class="stats-grid" id="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Сотрудники</div>
      <div class="stat-value" id="s-staff">—</div>
      <div class="stat-sub" id="s-staff-breakdown">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Выручка (оплачено)</div>
      <div class="stat-value" id="s-revenue" style="font-size:22px">—</div>
      <div class="stat-sub">сумма оплаченных платежей</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Всего заказов</div>
      <div class="stat-value" id="s-orders">—</div>
      <div class="stat-sub" id="s-deliveries">доставок: —</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Клиентов / Курьеров</div>
      <div class="stat-value" id="s-clients">—</div>
      <div class="stat-sub" id="s-couriers">курьеров: —</div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">Список сотрудников</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Имя</th>
            <th>Фамилия</th>
            <th>Email</th>
            <th>Телефон</th>
            <th>Роль</th>
            <th>Зарегистрирован</th>
          </tr>
        </thead>
        <tbody id="users-tbody">
          <tr><td colspan="7" class="empty-state">Загрузка...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<script src="js/auth.js"></script>
<script>
requireAuth();

// Только для админа
if (localStorage.getItem('role') !== 'Admin') {
  window.location.href = 'dashboard.html';
}

setupHeader();

const API_USERS = 'http://localhost:5206/api/users';
const myId = Number(localStorage.getItem('userId'));

function notify(msg, type = 'success') {
  const el = document.getElementById('notification');
  el.textContent = msg;
  el.className = `notification ${type} show`;
  setTimeout(() => el.classList.remove('show'), 3000);
}

async function loadStats() {
  try {
    const r = await fetch(`${API_USERS}/stats`);
    if (!r.ok) return;
    const s = await r.json();
    document.getElementById('s-staff').textContent = s.totalStaff;
    document.getElementById('s-staff-breakdown').textContent =
      `админов: ${s.totalAdmins} · операторов: ${s.totalOperators} · курьеров: ${s.totalCouriersUsr} · бухгалтеров: ${s.totalAccountants}`;
    document.getElementById('s-revenue').textContent   =
      Number(s.totalRevenue).toLocaleString('ru-RU', { minimumFractionDigits: 2 }) + ' ₽';
    document.getElementById('s-orders').textContent    = s.totalOrders;
    document.getElementById('s-deliveries').textContent = `доставок: ${s.totalDeliveries}`;
    document.getElementById('s-clients').textContent   = s.totalClients;
    document.getElementById('s-couriers').textContent  = `курьеров: ${s.totalCouriers}`;
  } catch (e) { /* ignore */ }
}

async function loadUsers() {
  try {
    const r = await fetch(API_USERS);
    if (!r.ok) throw new Error(r.status);
    const users = await r.json();
    const tbody = document.getElementById('users-tbody');
    if (users.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty-state">Нет пользователей</td></tr>';
      return;
    }
    tbody.innerHTML = users.map(u => {
      const isMe = u.id === myId;
      const roleBadge = roleBadgeHtml(u.role);
      const date = new Date(u.createdAt).toLocaleDateString('ru-RU');
      return `<tr>
        <td>${u.id}${isMe ? ' <span style="color:var(--orange);font-size:11px">(вы)</span>' : ''}</td>
        <td>${u.firstName}</td>
        <td>${u.lastName}</td>
        <td>${u.email}</td>
        <td>${u.phone}</td>
        <td>${roleBadge}</td>
        <td>${date}</td>
      </tr>`;
    }).join('');
  } catch (e) {
    document.getElementById('users-tbody').innerHTML =
      '<tr><td colspan="7" class="empty-state" style="color:#D32F2F">Ошибка загрузки.</td></tr>';
  }
}

const ROLE_BADGES = {
  1: ['Админ',     'assigned'],
  2: ['Клиент',    'new'],
  3: ['Курьер',    'inprogress'],
  4: ['Оператор',  'available'],
  5: ['Бухгалтер', 'paid'],
};

function roleBadgeHtml(role) {
  const [label, cls] = ROLE_BADGES[role] ?? ['?', 'new'];
  return `<span class="badge badge-${cls}">${label}</span>`;
}

loadStats();
loadUsers();
</script>

</body>
</html>
