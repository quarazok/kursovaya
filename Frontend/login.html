<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Быстрая доставка</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
    .auth-box { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 40px; width: 100%; max-width: 400px; }
    .auth-logo { text-align: center; font-size: 22px; font-weight: 700; color: var(--orange); margin-bottom: 8px; }
    .auth-subtitle { text-align: center; color: var(--text-muted); font-size: 13px; margin-bottom: 28px; }
    .auth-box .form-group { margin-bottom: 14px; }
    .auth-box .form-group input { width: 100%; }
    .auth-btn { width: 100%; padding: 10px; font-size: 15px; margin-top: 6px; }
    .auth-link { text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-muted); }
    .auth-link a { color: var(--orange); text-decoration: none; font-weight: 600; }
    .auth-link a:hover { text-decoration: underline; }
    .error-msg { color: #D32F2F; font-size: 13px; margin-top: 10px; text-align: center; min-height: 20px; }
    .test-divider { display: flex; align-items: center; gap: 10px; margin: 18px 0 10px; color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    .test-divider::before, .test-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .test-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .test-grid-4 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .test-btn { padding: 9px; font-size: 13px; font-weight: 600; border: 1px solid var(--border); background: var(--bg); color: var(--text); border-radius: var(--radius); cursor: pointer; transition: all 0.15s; }
    .test-btn:hover { background: #FFF3EE; border-color: var(--orange); color: var(--orange); }
  </style>
</head>
<body>

<div class="auth-box">
  <div class="auth-logo">🚚 Быстрая доставка</div>
  <div class="auth-subtitle">CRM-система курьерской службы</div>

  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="ivan@example.com" autocomplete="email">
  </div>
  <div class="form-group">
    <label>Пароль</label>
    <input type="password" id="password" placeholder="••••••" autocomplete="current-password">
  </div>

  <div class="error-msg" id="error-msg"></div>

  <button class="btn btn-primary auth-btn" onclick="login()" id="btn-login">Войти</button>

  <div class="test-divider">Тестовые аккаунты сотрудников</div>
  <div class="test-grid-4">
    <button class="test-btn" onclick="quickLogin('test.admin@delivery.local',      'Test1234')">Вход как Админ</button>
    <button class="test-btn" onclick="quickLogin('test.operator@delivery.local',   'Test1234')">Вход как Оператор</button>
    <button class="test-btn" onclick="quickLogin('test.courier@delivery.local',    'Test1234')">Вход как Курьер</button>
    <button class="test-btn" onclick="quickLogin('test.accountant@delivery.local', 'Test1234')">Вход как Бухгалтер</button>
  </div>

  <div class="auth-link">
    Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
  </div>
</div>

<script>
// Если в storage остался неподходящий токен (клиент или устаревшая роль) — чистим.
const STAFF_ROLES_OK = ['Admin', 'Operator', 'Courier', 'Accountant'];
const storedRole = localStorage.getItem('role');
if (storedRole && !STAFF_ROLES_OK.includes(storedRole)) {
  localStorage.removeItem('token');
  localStorage.removeItem('userId');
  localStorage.removeItem('firstName');
  localStorage.removeItem('lastName');
  localStorage.removeItem('role');
}
if (localStorage.getItem('token')) {
  window.location.href = 'dashboard.html';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

async function login() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('error-msg');
  const btn      = document.getElementById('btn-login');

  errEl.textContent = '';

  if (!email || !password) {
    errEl.textContent = 'Введите email и пароль';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Вход...';

  try {
    const r = await fetch('http://localhost:5206/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });

    if (!r.ok) {
      const msg = await r.text();
      errEl.textContent = msg || 'Неверный email или пароль';
      return;
    }

    const data = await r.json();

    if (data.role === 'Client') {
      errEl.textContent = 'Это клиентский аккаунт. Используйте клиентский сайт.';
      return;
    }

    localStorage.setItem('token',     data.token);
    localStorage.setItem('userId',    data.id);
    localStorage.setItem('firstName', data.firstName);
    localStorage.setItem('lastName',  data.lastName);
    localStorage.setItem('email',     data.email);
    localStorage.setItem('role',      data.role);

    window.location.href = 'dashboard.html';
  } catch (e) {
    errEl.textContent = 'Не удалось подключиться к серверу';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Войти';
  }
}

async function quickLogin(email, password) {
  const errEl = document.getElementById('error-msg');
  errEl.textContent = '';
  try {
    const r = await fetch('http://localhost:5206/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    if (!r.ok) {
      errEl.textContent = 'Тестовый аккаунт не найден. Перезапустите бэкенд.';
      return;
    }
    const data = await r.json();
    localStorage.setItem('token',     data.token);
    localStorage.setItem('userId',    data.id);
    localStorage.setItem('firstName', data.firstName);
    localStorage.setItem('lastName',  data.lastName);
    localStorage.setItem('email',     data.email);
    localStorage.setItem('role',      data.role);
    window.location.href = 'dashboard.html';
  } catch {
    errEl.textContent = 'Не удалось подключиться к серверу';
  }
}
</script>

</body>
</html>
